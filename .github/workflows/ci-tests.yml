name: CI - Testes Automatizados

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    name: Backend - .NET Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore backend-tests

      - name: Build
        run: dotnet build backend-tests --no-restore

      - name: Run Unit Tests
        run: dotnet test backend-tests --no-build --verbosity normal --filter "Category=Unit"

      - name: Run Integration Tests
        run: dotnet test backend-tests --no-build --verbosity normal --filter "Category=Integration"

  frontend-tests:
    name: Frontend - Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 
          cache: 'npm'
          cache-dependency-path: frontend-tests/package-lock.json

      - name: Install dependencies
        run: cd frontend-tests && npm ci

      - name: Install Playwright Browsers
        run: cd frontend-tests && npx playwright install --with-deps

      - name: Run Playwright Tests
        run: cd frontend-tests && npx playwright test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend-tests/playwright-report/
          retention-days: 7

